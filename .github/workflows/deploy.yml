name: Build and Deploy Hanzo SQL

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'conf/**'
      - 'docker-entrypoint-initdb.d/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        continue-on-error: true
        id: dockerhub
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: PG_MAJOR=16
          tags: |
            ghcr.io/hanzoai/sql:latest
            ghcr.io/hanzoai/sql:16-alpine
            ghcr.io/hanzoai/sql:${{ github.sha }}
          cache-from: type=gha,scope=sql
          cache-to: type=gha,mode=max,scope=sql

      - name: Push to Docker Hub
        if: steps.dockerhub.outcome == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: PG_MAJOR=16
          tags: |
            docker.io/hanzoai/sql:latest
            docker.io/hanzoai/sql:16-alpine
          cache-from: type=gha,scope=sql
